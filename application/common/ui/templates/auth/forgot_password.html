{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center auth-shell">
  <div class="auth-card">
    <h1 class="h4 mb-3 auth-title">Forgot Password</h1>
    <p class="text-muted mb-3 auth-help">Enter your email address and we'll generate a password reset link.</p>

    <form method="post" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label auth-label" for="email">Email Address</label>
        <input class="form-control auth-input" id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <button class="btn btn-dark w-100 mb-3 auth-submit" type="submit">Request Reset Link</button>

      <p class="small text-body-secondary mb-0">
        <a href="{{ url_for('auth.login') }}" class="auth-link">← Back to Login</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
