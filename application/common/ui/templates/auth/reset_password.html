{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center auth-shell">
  <div class="auth-card">
    <h1 class="h4 mb-3 auth-title">Reset Password</h1>
    {% if username %}
    <p class="text-muted mb-3 auth-help">Create a new password for <strong>{{ username }}</strong>.</p>
    {% endif %}

    <form method="post" action="{{ url_for('auth.reset_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="token" value="{{ token }}">

      <div class="mb-3">
        <label class="form-label auth-label" for="new_password">New Password</label>
        <input class="form-control auth-input" id="new_password" name="new_password" type="password"
          autocomplete="new-password" required minlength="12">
        <small class="text-muted">Min 12 chars, with uppercase, lowercase, number, and special character (!@#$%^&*
          etc)</small>
      </div>

      <div class="mb-3">
        <label class="form-label auth-label" for="confirm_password">Confirm Password</label>
        <input class="form-control auth-input" id="confirm_password" name="confirm_password" type="password"
          autocomplete="new-password" required>
      </div>

      <button class="btn btn-dark w-100 mb-3 auth-submit" type="submit">Reset Password</button>

      <p class="small text-body-secondary mb-0">
        <a href="{{ url_for('auth.login') }}" class="auth-link">← Back to Login</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
