<div class="modal-layer" data-modal="delete" aria-hidden="true">
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="delete-modal-title">Delete Artwork</h2>
      <button type="button" class="modal-close" data-modal-dismiss>Cancel</button>
    </div>
    <div class="modal-body">
      <p class="modal-warning">Deletion is not yet implemented.</p>
      <div class="modal-row">
        <p class="modal-label">Slug</p>
        <p class="modal-slug" data-modal-slug></p>
      </div>
      <div class="modal-row">
        <p class="modal-label">Thumbnail</p>
        <img class="modal-thumb" data-modal-thumb alt="Artwork thumbnail">
      </div>
    </div>
    <div class="modal-footer">
      <button type="button" class="modal-close" data-modal-dismiss>Cancel</button>
      <button type="button" class="modal-button" data-modal-confirm disabled>Confirm Delete</button>
    </div>
  </div>
</div>
