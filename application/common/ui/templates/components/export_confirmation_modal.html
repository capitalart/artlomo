<!-- Export Confirmation Modal -->
<div id="exportConfirmationModal" class="export-modal-backdrop" aria-hidden="true" role="alertdialog" aria-labelledby="exportConfirmationTitle">
  <div class="export-modal-dialog">
    <div class="export-modal-content">
      <div class="export-modal-header">
        <h2 id="exportConfirmationTitle" class="export-modal-title">No Mockups Generated</h2>
        <button type="button" class="export-modal-close" aria-label="Close" data-confirm-cancel">
          <i class="fa-solid fa-times" aria-hidden="true"></i>
        </button>
      </div>
      <div class="export-modal-body">
        <p>No mockup images have been generated for this artwork yet. Do you want to continue with the export without mockups?</p>
      </div>
      <div class="export-modal-footer">
        <button type="button" class="artlomo-btn artlomo-btn--secondary" data-confirm-cancel">Cancel</button>
        <button type="button" class="artlomo-btn" data-confirm-continue">Continue</button>
      </div>
    </div>
  </div>
</div>
